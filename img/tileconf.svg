<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="conf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e2af"/>
      <stop offset="100%" style="stop-color:#bd9425"/>
    </linearGradient>
    <linearGradient id="active" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#cdd6f4"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
  <style>
    @keyframes ws-cycle {
      0%,15%   { fill: #f9e2af; }
      16%,31%  { fill: #a6e3a1; }
      32%,47%  { fill: #89dceb; }
      48%,63%  { fill: #f38ba8; }
      64%,79%  { fill: #cba6f7; }
      80%,100% { fill: #f9e2af; }
    }
    @keyframes pulse  { 0%,100% { opacity: 0.55; } 50% { opacity: 1.0; } }
    @keyframes shift  { 0%,100% { transform: translateX(0); } 50% { transform: translateX(2px); } }
    .ws-active { animation: ws-cycle 6s steps(1) infinite; }
    .layout    { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
    .tile-grow { animation: shift 4s ease-in-out infinite; }
  </style>

  <!-- Disc -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#conf)" stroke-width="3"/>

  <!-- Mini WM "screen" with bar -->
  <g class="tile-grow">
    <!-- screen frame -->
    <rect x="44" y="60" width="168" height="120" rx="4" fill="#11111b" stroke="#313244" stroke-width="1.2"/>

    <!-- top bar -->
    <rect x="46" y="62" width="164" height="14" rx="1" fill="#1e1e2e"/>
    <!-- WS group 1 (3 squares) -->
    <rect x="50" y="65" width="8" height="8" rx="1" class="ws-active"/>
    <rect x="60" y="65" width="8" height="8" rx="1" fill="#585b70"/>
    <rect x="70" y="65" width="8" height="8" rx="1" fill="#585b70"/>
    <!-- WS group 2 -->
    <rect x="84" y="65" width="8" height="8" rx="1" fill="#585b70"/>
    <rect x="94" y="65" width="8" height="8" rx="1" fill="#585b70"/>
    <rect x="104" y="65" width="8" height="8" rx="1" fill="#585b70"/>
    <!-- WS group 3 -->
    <rect x="118" y="65" width="8" height="8" rx="1" fill="#585b70"/>
    <rect x="128" y="65" width="8" height="8" rx="1" fill="#585b70"/>
    <rect x="138" y="65" width="8" height="8" rx="1" fill="#585b70"/>
    <!-- separator + layout glyph (☰ for tabbed) -->
    <line x1="152" y1="66" x2="152" y2="73" stroke="#585b70" stroke-width="1"/>
    <g class="layout" stroke="#f9e2af" stroke-width="1.4" stroke-linecap="round">
      <line x1="158" y1="67" x2="166" y2="67"/>
      <line x1="158" y1="69.5" x2="166" y2="69.5"/>
      <line x1="158" y1="72" x2="166" y2="72"/>
    </g>
    <!-- tabs (active + inactive on right) -->
    <rect x="174" y="65" width="10" height="8" rx="1" fill="url(#active)"/>
    <rect x="186" y="65" width="10" height="8" rx="1" fill="#45475a"/>
    <rect x="198" y="65" width="10" height="8" rx="1" fill="#45475a"/>

    <!-- tile layout below the bar (master + 2 stack) -->
    <rect x="50" y="82" width="86"  height="92" rx="2" fill="#181825" stroke="#7aa2f7" stroke-width="1.2"/>
    <rect x="142" y="82" width="64" height="44" rx="2" fill="#181825" stroke="#45475a" stroke-width="0.8"/>
    <rect x="142" y="130" width="64" height="44" rx="2" fill="#181825" stroke="#45475a" stroke-width="0.8"/>

    <!-- mock content lines in master pane -->
    <g filter="url(#soft)">
      <rect x="56" y="92"  width="60" height="3" rx="1" fill="#7aa2f7" opacity="0.6"/>
      <rect x="56" y="100" width="74" height="3" rx="1" fill="#cdd6f4" opacity="0.45"/>
      <rect x="56" y="108" width="50" height="3" rx="1" fill="#cdd6f4" opacity="0.45"/>
      <rect x="56" y="116" width="68" height="3" rx="1" fill="#cdd6f4" opacity="0.45"/>
      <rect x="56" y="124" width="40" height="3" rx="1" fill="#a6e3a1" opacity="0.6"/>
      <rect x="56" y="132" width="74" height="3" rx="1" fill="#cdd6f4" opacity="0.45"/>
      <rect x="56" y="140" width="56" height="3" rx="1" fill="#cdd6f4" opacity="0.45"/>
      <rect x="56" y="148" width="44" height="3" rx="1" fill="#f9e2af" opacity="0.6"/>
      <rect x="56" y="156" width="62" height="3" rx="1" fill="#cdd6f4" opacity="0.45"/>
      <rect x="56" y="164" width="36" height="3" rx="1" fill="#cdd6f4" opacity="0.45"/>
    </g>

    <!-- tiny gear in upper-right of screen frame, hinting at "config" -->
    <g transform="translate(196 90)">
      <circle cx="0" cy="0" r="6" fill="none" stroke="#f9e2af" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#f9e2af"/>
      <g stroke="#f9e2af" stroke-width="1.4" stroke-linecap="round">
        <line x1="0" y1="-9" x2="0" y2="-7"/>
        <line x1="0" y1="9"  x2="0" y2="7"/>
        <line x1="-9" y1="0" x2="-7" y2="0"/>
        <line x1="9"  y1="0" x2="7"  y2="0"/>
      </g>
    </g>
  </g>

  <!-- Label -->
  <text x="128" y="208" font-family="monospace" font-size="20" font-weight="bold" fill="url(#conf)" text-anchor="middle" letter-spacing="1">tileconf</text>
  <text x="128" y="224" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">TUI config for tile</text>
</svg>
